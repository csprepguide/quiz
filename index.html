<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Prep Guide Quiz Portal</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f4f9; }
        .hidden { display: none; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; text-align: center; }
        .btn:disabled { background: #ccc; }
        .option { background: white; border: 1px solid #ddd; padding: 10px; margin: 5px 0; border-radius: 4px; cursor: pointer; }
        .option:hover { background: #e9e9e9; }
        .selected { background: #007bff !important; color: white; }
        .progress-bar { height: 8px; background: #ddd; border-radius: 4px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: #28a745; width: 0%; border-radius: 4px; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="app">
        <div id="home-screen">
            <h1>CS Prep Guide Quiz Portal</h1>
            <p>UGC NET CS | GATE CSE | Computer Teacher Exams</p>
            <select id="subject-filter" class="btn"><option value="">All Subjects</option></select>
            <select id="count-filter" class="btn">
                <option value="10">10 Questions</option>
                <option value="20">20 Questions</option>
                <option value="50">50 Questions</option>
            </select>
            <button class="btn" onclick="startQuiz()">Start Quiz</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <h3 id="question-text"></h3>
            <div id="options-container"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="changeQuestion(-1)">Prev</button>
                <button class="btn" onclick="changeQuestion(1)">Next</button>
            </div>
            <button class="btn" style="background:#28a745" onclick="finishQuiz()">Finish</button>
        </div>

        <div id="results-screen" class="hidden">
            <h2>Results</h2>
            <p id="score-text"></p>
            <button class="btn" onclick="showReview()">Review Answers</button>
            <button class="btn" onclick="location.reload()">Back to Home</button>
        </div>
    </div>

    <script>
        const QUESTIONS = [
            { id: 1, subject: "DBMS", question: "Which normal form deals with transitive dependency?", options: ["1NF", "2NF", "3NF", "BCNF"], correct: 2, explanation: "3NF deals with transitive dependencies." },
            { id: 2, subject: "OS", question: "Which scheduling algorithm is non-preemptive?", options: ["Round Robin", "FCFS", "SRTF", "Priority"], correct: 1, explanation: "First Come First Served (FCFS) is non-preemptive." }
        ];

        let state = { quiz: [], currentIdx: 0, answers: {} };

        // Initialize Subject Filter
        const subjects = [...new Set(QUESTIONS.map(q => q.subject))];
        subjects.forEach(s => document.getElementById('subject-filter').innerHTML += `<option value="${s}">${s}</option>`);

        function startQuiz() {
            const sub = document.getElementById('subject-filter').value;
            const count = parseInt(document.getElementById('count-filter').value);
            state.quiz = QUESTIONS.filter(q => !sub || q.subject === sub).slice(0, count);
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = state.quiz[state.currentIdx];
            document.getElementById('progress').style.width = ((state.currentIdx + 1) / state.quiz.length * 100) + '%';
            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = `option ${state.answers[state.currentIdx] === i ? 'selected' : ''}`;
                div.innerText = opt;
                div.onclick = () => { state.answers[state.currentIdx] = i; renderQuestion(); };
                container.appendChild(div);
            });
        }

        function changeQuestion(dir) {
            state.currentIdx = Math.max(0, Math.min(state.quiz.length - 1, state.currentIdx + dir));
            renderQuestion();
        }

        function finishQuiz() {
            let correct = 0;
            state.quiz.forEach((q, i) => { if (state.answers[i] === q.correct) correct++; });
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `Score: ${correct} / ${state.quiz.length}`;
        }

        function showReview() {
            let html = '<h2>Review</h2>';
            state.quiz.forEach((q, i) => {
                html += `<p><strong>${q.question}</strong><br>Correct: ${q.options[q.correct]}<br>Expl: ${q.explanation}</p>`;
            });
            document.getElementById('results-screen').innerHTML = html + `<button class="btn" onclick="location.reload()">Home</button>`;
        }
    </script>
</body>
</html>
