    if (mode === "jrf") pool = pool.filter(q => q.difficulty === "Hard");
    if (mode === "weak") {
      const weakUnits = Object.entries(stats.byUnit || {})
        .filter(([, s]) => s.attempted > 0 && (s.correct / s.attempted) < 0.5)
        .map(([u]) => parseInt(u));
      if (weakUnits.length > 0) pool = pool.filter(q => weakUnits.includes(q.unit));
    }
    pool = pool.sort(() => Math.random() - 0.5).slice(0, 10);
    setQuizState({ mode, questions: pool, current: 0, answers: [], score: 0 });
    setView("quiz");
  };

  const recordAnswer = (qId, unitId, topic, correct) => {
    const ns = { ...stats };
    ns.attempted = (ns.attempted || 0) + 1;
    ns.correct = (ns.correct || 0) + (correct ? 1 : 0);
    ns.byUnit = ns.byUnit || {};
    ns.byUnit[unitId] = ns.byUnit[unitId] || { attempted: 0, correct: 0 };
    ns.byUnit[unitId].attempted++;
    if (correct) ns.byUnit[unitId].correct++;
    ns.byTopic = ns.byTopic || {};
    ns.byTopic[topic] = ns.byTopic[topic] || { attempted: 0, correct: 0 };
    ns.byTopic[topic].attempted++;
    if (correct) ns.byTopic[topic].correct++;
    ns.history = [{ qId, correct, time: Date.now() }, ...(ns.history || [])].slice(0, 50);
    saveStats(ns);
  };

  const accuracy = stats.attempted > 0 ? Math.round((stats.correct / stats.attempted) * 100) : 0;

  return (
    <div style={{ minHeight: "100vh", background: "#0F172A", color: "#E2E8F0", fontFamily: "'Inter', sans-serif" }}>
      {/* Header */}
      <header style={{
        borderBottom: "1px solid #1E293B",
        padding: "0 24px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        height: 60, background: "#0F172A", position: "sticky", top: 0, zIndex: 50
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.5px", background: "linear-gradient(90deg,#818CF8,#A78BFA)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>CS Prep Guide</span>
          <span style={{ fontSize: 12, background: "#312E81", color: "#A5B4FC", padding: "2px 8px", borderRadius: 20, fontWeight: 600 }}>CS Prep</span>
        </div>
        <nav style={{ display: "flex", gap: 4 }}>
          {[["dashboard","Dashboard"],["modes","Quiz Modes"],["analytics","Analytics"]].map(([v, label]) => (
            <button key={v} onClick={() => setView(v)} style={{
              padding: "6px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600,
              background: view === v ? "#4F46E5" : "transparent",
              color: view === v ? "#fff" : "#94A3B8",
              transition: "all 0.15s"
            }}>{label}</button>
          ))}
        </nav>
      </header>

      {view === "dashboard" && <Dashboard stats={stats} accuracy={accuracy} onStart={startQuiz} />}
      {view === "modes" && <ModesPage onStart={startQuiz} />}
      {view === "quiz" && quizState && (
        <QuizPage
          quizState={quizState}
          setQuizState={setQuizState}
          onRecord={recordAnswer}
          onExit={() => setView("dashboard")}
        />
      )}
      {view === "analytics" && <AnalyticsPage stats={stats} />}
    </div>
  );
}

// ─── QUIZ PAGE ────────────────────────────────────────────────────────────────
function QuizPage({ quizState, setQuizState, onRecord, onExit }) {
  const [selected, setSelected] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [showExplanation, setShowExplanation] = useState(false);
  const [aiExplanation, setAiExplanation] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);

  const { questions, current, answers, score } = quizState;
  const q = questions[current];

  const handleSubmit = () => {
    if (selected === null) return;
    const correct = selected === q.correct;
    setSubmitted(true);
    setShowExplanation(true);
    onRecord(q.id, q.unit, q.topic, correct);
    setQuizState(qs => ({
      ...qs,
      answers: [...qs.answers, { qId: q.id, selected, correct }],
      score: qs.score + (correct ? 1 : 0)
    }));
  };

  const handleNext = () => {
    if (current + 1 >= questions.length) {
      setQuizState(qs => ({ ...qs, current: qs.current + 1 }));
    } else {
      setQuizState(qs => ({ ...qs, current: qs.current + 1 }));
      setSelected(null);
      setSubmitted(false);
      setShowExplanation(false);
      setAiExplanation(null);
    }
  };

  const fetchAiDeepDive = async () => {
    setAiLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `You are a CS Prep Guide expert. For this question, provide a deep exam-focused analysis in JSON only (no markdown, no backticks):
Question: "${q.question}"
Topic: ${q.topic} | Subtopic: ${q.subtopic} | Year: ${q.year}
Correct answer: "${q.options[q.correct]}"

Return ONLY valid JSON with these keys:
{
  "examinerThinking": "Why examiners love testing this concept (2 sentences)",
  "conceptRevision": ["3-4 bullet points revising the core concept"],
  "likelyNextQuestions": ["3 future questions the examiner might ask"],
  "commonMistakes": "The most common mistake students make on this type of question (1-2 sentences)"
}`
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || "";
      const clean = text.replace(/```json|```/g, "").trim();
      setAiExplanation(JSON.parse(clean));
    } catch {
      setAiExplanation({ examinerThinking: "Could not load AI analysis.", conceptRevision: [], likelyNextQuestions: [], commonMistakes: "" });
    }
    setAiLoading(false);
  };

  // Quiz complete
  if (current >= questions.length) {
    const finalScore = quizState.score;
    const total = questions.length;
    const pct = Math.round((finalScore / total) * 100);
    return (
      <div style={{ maxWidth: 600, margin: "60px auto", padding: "0 20px", textAlign: "center" }}>
        <div style={{ background: "#1E293B", borderRadius: 24, padding: 40, border: "1px solid #334155" }}>
          <div style={{ fontSize: 60, marginBottom: 16 }}>{pct >= 70 ? "🎉" : pct >= 50 ? "💪" : "📚"}</div>
          <h2 style={{ fontSize: 28, fontWeight: 800, margin: 0 }}>Quiz Complete!</h2>
          <div style={{ fontSize: 48, fontWeight: 800, margin: "20px 0", color: pct >= 70 ? "#10B981" : pct >= 50 ? "#F59E0B" : "#EF4444" }}>
            {finalScore}/{total}
          </div>
          <div style={{ fontSize: 16, color: "#64748B", marginBottom: 24 }}>{pct}% accuracy</div>
          {/* Score bar */}
          <div style={{ background: "#0F172A", borderRadius: 99, height: 10, overflow: "hidden", marginBottom: 24 }}>
            <div style={{ height: "100%", width: `${pct}%`, background: pct >= 70 ? "#10B981" : pct >= 50 ? "#F59E0B" : "#EF4444", borderRadius: 99, transition: "width 1s ease" }} />
          </div>
          <div style={{ fontSize: 14, color: "#94A3B8", marginBottom: 28 }}>
            {pct >= 70 ? "Excellent! You're JRF-ready on these topics." : pct >= 50 ? "Good progress! Review wrong answers for better retention." : "Keep practicing! Focus on conceptual understanding."}
          </div>
          <button onClick={onExit} style={{
            background: "#4F46E5", color: "#fff", border: "none", borderRadius: 12,
            padding: "12px 28px", fontSize: 15, fontWeight: 600, cursor: "pointer"
          }}>Back to Dashboard</button>
        </div>
      </div>
    );
  }

  const progress = ((current) / questions.length) * 100;

  return (
    <div style={{ maxWidth: 800, margin: "0 auto", padding: "24px 20px" }}>
      {/* Progress */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontSize: 13, color: "#64748B" }}>Question {current + 1} of {questions.length}</span>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#10B981" }}>✅ {score} correct</span>
            <button onClick={onExit} style={{ background: "none", border: "1px solid #334155", color: "#64748B", padding: "4px 10px", borderRadius: 8, cursor: "pointer", fontSize: 12 }}>Exit</button>
          </div>
        </div>
        <div style={{ background: "#1E293B", borderRadius: 99, height: 4, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${progress}%`, background: "#4F46E5", borderRadius: 99, transition: "width 0.3s" }} />
        </div>
      </div>

      {/* Question Card */}
      <div style={{ background: "#1E293B", borderRadius: 20, border: "1px solid #334155", overflow: "hidden" }}>
        {/* Meta badges */}
        <div style={{ padding: "16px 20px 0", display: "flex", gap: 8, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11, fontWeight: 700, background: "#1E293B", border: "1px solid #334155", color: "#94A3B8", padding: "3px 8px", borderRadius: 20 }}>📅 {q.year}</span>
          <span style={{ fontSize: 11, fontWeight: 700, background: DIFFICULTY_COLORS[q.difficulty] + "22", color: DIFFICULTY_COLORS[q.difficulty], padding: "3px 8px", borderRadius: 20 }}>
            {q.difficulty}
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, background: "#312E81", color: "#A5B4FC", padding: "3px 8px", borderRadius: 20 }}>
            {q.topic}
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, background: FREQ_COLORS[q.pyqFrequency] + "22", color: FREQ_COLORS[q.pyqFrequency], padding: "3px 8px", borderRadius: 20 }}>
            🔥 PYQ {q.pyqFrequency} ({q.pyqCount}×)
          </span>
        </div>

        {/* Question */}
        <div style={{ padding: "20px 20px 0" }}>
          <p style={{ fontSize: 17, fontWeight: 600, lineHeight: 1.6, margin: 0, color: "#F1F5F9" }}>{q.question}</p>
        </div>

        {/* Options */}
        <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 10 }}>
          {q.options.map((opt, i) => {
            let bg = "#0F172A", border = "#334155", color = "#CBD5E1";
            if (submitted) {
              if (i === q.correct) { bg = "#064E3B"; border = "#10B981"; color = "#6EE7B7"; }
              else if (i === selected && i !== q.correct) { bg = "#450A0A"; border = "#EF4444"; color = "#FCA5A5"; }
            } else if (selected === i) {
              bg = "#1E1B4B"; border = "#4F46E5"; color = "#A5B4FC";
            }
            return (
              <button key={i} onClick={() => !submitted && setSelected(i)} style={{
                background: bg, border: `1px solid ${border}`, borderRadius: 12,
                padding: "14px 16px", textAlign: "left", cursor: submitted ? "default" : "pointer",
                color, fontSize: 14, fontWeight: 500, display: "flex", alignItems: "center", gap: 12,
                transition: "all 0.15s"
              }}>
                <span style={{ minWidth: 24, height: 24, borderRadius: 6, border: `1px solid ${border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, background: "#1E293B" }}>
                  {submitted && i === q.correct ? "✓" : submitted && i === selected && i !== q.correct ? "✗" : String.fromCharCode(65 + i)}
                </span>
                {opt}
              </button>
            );
          })}
        </div>

        {/* Submit */}
        {!submitted && (
          <div style={{ padding: "0 20px 20px" }}>
            <button onClick={handleSubmit} disabled={selected === null} style={{
              width: "100%", background: selected !== null ? "#4F46E5" : "#1E293B",
              color: selected !== null ? "#fff" : "#475569",
              border: "none", borderRadius: 12, padding: "13px", fontSize: 15,
              fontWeight: 600, cursor: selected !== null ? "pointer" : "default",
              transition: "all 0.15s"
            }}>Submit Answer</button>
          </div>
        )}
      </div>

      {/* Explanation */}
      {showExplanation && (
        <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 16 }}>
          {/* Result banner */}
          <div style={{
            background: selected === q.correct ? "#064E3B" : "#450A0A",
            border: `1px solid ${selected === q.correct ? "#10B981" : "#EF4444"}`,
            borderRadius: 16, padding: "16px 20px",
            display: "flex", alignItems: "center", gap: 12
          }}>
            <span style={{ fontSize: 24 }}>{selected === q.correct ? "✅" : "❌"}</span>
            <div>
              <div style={{ fontWeight: 700, color: selected === q.correct ? "#6EE7B7" : "#FCA5A5", fontSize: 15 }}>
                {selected === q.correct ? "Correct!" : `Incorrect — Correct answer: ${q.options[q.correct]}`}
              </div>
              <div style={{ fontSize: 13, color: "#94A3B8", marginTop: 2 }}>{q.explanation}</div>
            </div>
          </div>

          {/* Detailed Explanation */}
          <div style={{ background: "#1E293B", borderRadius: 16, border: "1px solid #334155", overflow: "hidden" }}>
            <div style={{ padding: "16px 20px", borderBottom: "1px solid #334155", fontWeight: 700, color: "#A5B4FC", fontSize: 14 }}>
              📝 Detailed Explanation
            </div>
            <div style={{ padding: 20 }}>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#10B981", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>Why Correct?</div>
                <p style={{ color: "#CBD5E1", fontSize: 14, lineHeight: 1.6, margin: 0 }}>{q.whyCorrect}</p>
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#EF4444", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>Why Other Options Are Wrong?</div>
                {q.options.map((opt, i) => i !== q.correct && (
                  <div key={i} style={{ marginBottom: 8 }}>
                    <span style={{ fontWeight: 600, color: "#F87171", fontSize: 13 }}>({String.fromCharCode(65 + i)}) {opt}: </span>
                    <span style={{ color: "#94A3B8", fontSize: 13 }}>{q.whyWrong[i]}</span>
                  </div>
                ))}
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#F59E0B", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>💡 Memory Trick</div>
                <p style={{ color: "#FDE68A", fontSize: 14, lineHeight: 1.6, margin: 0, background: "#292400", padding: "10px 14px", borderRadius: 10, borderLeft: "3px solid #F59E0B" }}>{q.memoryTrick}</p>
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#8B5CF6", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>🔗 Related Concepts</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {q.relatedConcepts.map(c => (
                    <span key={c} style={{ background: "#312E81", color: "#C4B5FD", fontSize: 12, padding: "3px 10px", borderRadius: 20, fontWeight: 500 }}>{c}</span>
                  ))}
                </div>
              </div>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#3B82F6", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>🔮 Examiner May Ask Next</div>
                {q.futureTopics.map(t => (
                  <div key={t} style={{ fontSize: 13, color: "#93C5FD", padding: "3px 0" }}>→ {t}</div>
                ))}
              </div>
            </div>
          </div>

          {/* AI Deep Dive */}
          <div style={{ background: "#1E293B", borderRadius: 16, border: "1px solid #334155", overflow: "hidden" }}>
            <div style={{ padding: "16px 20px", borderBottom: "1px solid #334155", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontWeight: 700, color: "#F59E0B", fontSize: 14 }}>🤖 AI Deep Dive</div>
              {!aiExplanation && !aiLoading && (
                <button onClick={fetchAiDeepDive} style={{
                  background: "#292400", color: "#FDE68A", border: "1px solid #92400E",
                  borderRadius: 8, padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer"
                }}>Generate AI Analysis</button>
              )}
            </div>
            <div style={{ padding: 20 }}>
              {aiLoading && <div style={{ color: "#64748B", fontSize: 14, textAlign: "center", padding: "20px 0" }}>🔄 Generating AI analysis...</div>}
              {!aiLoading && !aiExplanation && (
                <div style={{ color: "#64748B", fontSize: 13 }}>Click "Generate AI Analysis" for examiner mindset, concept revision, and predicted future questions powered by Claude AI.</div>
              )}
              {aiExplanation && (
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {aiExplanation.examinerThinking && (
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#F59E0B", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>🧠 Examiner's Thinking</div>
                      <p style={{ color: "#FDE68A", fontSize: 13, lineHeight: 1.6, margin: 0 }}>{aiExplanation.examinerThinking}</p>
                    </div>
                  )}
                  {aiExplanation.conceptRevision?.length > 0 && (
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#818CF8", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>📚 Quick Revision Points</div>
                      {aiExplanation.conceptRevision.map((pt, i) => (
                        <div key={i} style={{ fontSize: 13, color: "#C4B5FD", padding: "3px 0" }}>• {pt}</div>
                      ))}
                    </div>
                  )}
                  {aiExplanation.likelyNextQuestions?.length > 0 && (
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#34D399", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>🔮 Likely Future Questions</div>
                      {aiExplanation.likelyNextQuestions.map((q, i) => (
                        <div key={i} style={{ fontSize: 13, color: "#6EE7B7", padding: "4px 0", borderBottom: "1px solid #0F172A" }}>→ {q}</div>
                      ))}
                    </div>
                  )}
                  {aiExplanation.commonMistakes && (
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#F87171", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>⚠️ Common Mistake</div>
                      <p style={{ color: "#FCA5A5", fontSize: 13, lineHeight: 1.6, margin: 0 }}>{aiExplanation.commonMistakes}</p>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* Next button */}
          <button onClick={handleNext} style={{
            background: "#4F46E5", color: "#fff", border: "none", borderRadius: 12,
            padding: "13px", fontSize: 15, fontWeight: 600, cursor: "pointer", width: "100%"
          }}>
            {current + 1 >= questions.length ? "See Results →" : "Next Question →"}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── ANALYTICS PAGE ───────────────────────────────────────────────────────────
function AnalyticsPage({ stats }) {
  const unitData = UNITS.map(u => {
    const s = stats.byUnit?.[u.id] || { attempted: 0, correct: 0 };
    return { ...u, ...s, acc: s.attempted > 0 ? Math.round((s.correct / s.attempted) * 100) : 0 };
  });

  const topicData = Object.entries(stats.byTopic || {}).map(([topic, s]) => ({
    topic, ...s, acc: s.attempted > 0 ? Math.round((s.correct / s.attempted) * 100) : 0
  })).sort((a, b) => a.acc - b.acc);

  const weakTopics = topicData.filter(t => t.acc < 60);
  const strongTopics = topicData.filter(t => t.acc >= 70);

  const overallAcc = stats.attempted > 0 ? Math.round((stats.correct / stats.attempted) * 100) : 0;
  const jrfReadiness = Math.min(100, Math.round(overallAcc * 1.1));

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "32px 20px" }}>
      <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 4 }}>Analytics</h1>
      <p style={{ color: "#64748B", fontSize: 14, marginBottom: 28 }}>Your performance insights</p>

      {/* JRF Meter */}
      <div style={{ background: "linear-gradient(135deg, #1E1B4B, #312E81)", borderRadius: 20, padding: "24px 28px", marginBottom: 24, border: "1px solid #4F46E5" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#A5B4FC", textTransform: "uppercase", letterSpacing: 0.8 }}>JRF Readiness Meter</div>
            <div style={{ fontSize: 11, color: "#6366F1", marginTop: 2 }}>Based on your accuracy across topics</div>
          </div>
          <div style={{ fontSize: 36, fontWeight: 800, color: jrfReadiness >= 70 ? "#34D399" : jrfReadiness >= 50 ? "#FDE68A" : "#F87171" }}>
            {stats.attempted === 0 ? "—" : `${jrfReadiness}%`}
          </div>
        </div>
        <div style={{ background: "#1E1B4B", borderRadius: 99, height: 10, overflow: "hidden" }}>
          <div style={{
            height: "100%", borderRadius: 99,
            background: jrfReadiness >= 70 ? "#10B981" : jrfReadiness >= 50 ? "#F59E0B" : "#EF4444",
            width: `${jrfReadiness}%`, transition: "width 0.8s ease"
          }} />
        </div>
        <div style={{ marginTop: 10, fontSize: 12, color: "#818CF8" }}>
          {stats.attempted === 0 ? "Attempt some questions to see your JRF readiness." : jrfReadiness >= 70 ? "🎉 Looking strong for JRF! Keep the momentum." : jrfReadiness >= 50 ? "📈 On track. Focus on weak topics to boost your JRF chances." : "📚 More practice needed. Target concept clarity over speed."}
        </div>
      </div>

      {/* Unit Accuracy Chart */}
      <div style={{ background: "#1E293B", borderRadius: 20, border: "1px solid #334155", padding: "24px", marginBottom: 20 }}>
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 20, color: "#CBD5E1" }}>Unit-Wise Accuracy</div>
        {unitData.map(u => (
          <div key={u.id} style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ fontSize: 13, color: "#94A3B8" }}>{u.name}</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: u.attempted > 0 ? u.color : "#64748B" }}>
                {u.attempted > 0 ? `${u.acc}%` : "Not attempted"} {u.attempted > 0 && `(${u.correct}/${u.attempted})`}
              </span>
            </div>
            <div style={{ background: "#0F172A", borderRadius: 99, height: 8, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${u.acc}%`, background: u.color, borderRadius: 99, transition: "width 0.6s ease" }} />
            </div>
          </div>
        ))}
      </div>

      {/* Weak & Strong Topics */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div style={{ background: "#1E293B", borderRadius: 16, border: "1px solid #334155", padding: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#EF4444", marginBottom: 16 }}>⚠️ Weak Topics</div>
          {weakTopics.length === 0
            ? <div style={{ color: "#64748B", fontSize: 13 }}>{stats.attempted === 0 ? "Start attempting questions first!" : "No weak topics — great job!"}</div>
            : weakTopics.map(t => (
              <div key={t.topic} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #0F172A" }}>
                <span style={{ fontSize: 13, color: "#CBD5E1" }}>{t.topic}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#EF4444", background: "#450A0A", padding: "2px 8px", borderRadius: 20 }}>{t.acc}%</span>
              </div>
            ))
          }
        </div>
        <div style={{ background: "#1E293B", borderRadius: 16, border: "1px solid #334155", padding: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#10B981", marginBottom: 16 }}>💪 Strong Topics</div>
          {strongTopics.length === 0
            ? <div style={{ color: "#64748B", fontSize: 13 }}>{stats.attempted === 0 ? "Start attempting questions first!" : "Keep practicing to build strengths!"}</div>
            : strongTopics.map(t => (
              <div key={t.topic} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #0F172A" }}>
                <span style={{ fontSize: 13, color: "#CBD5E1" }}>{t.topic}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#10B981", background: "#064E3B", padding: "2px 8px", borderRadius: 20 }}>{t.acc}%</span>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

    // ─── MOUNT ────────────────────────────────────────────────────────────────
    const rootEl = document.getElementById('root');
    const appRoot = ReactDOM.createRoot(rootEl);
    appRoot.render(<App />);

    // Hide loading screen once React has mounted
    const loadingEl = document.getElementById('loading-screen');
    if (loadingEl) {
      loadingEl.style.opacity = '0';
      setTimeout(() => loadingEl.remove(), 300);
    }
  </script>

</body>
</html>
